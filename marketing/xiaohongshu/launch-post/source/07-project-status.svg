  <text x="540" y="1186" font-size="30" fill="#F6C85F" font-weight="700" text-anchor="middle">适合现在试用和反馈，</text>
  <text x="540" y="1230" font-size="30" fill="#F6C85F" font-weight="700" text-anchor="middle">暂时不建议直接作为生产依赖。</text>
