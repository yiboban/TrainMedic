  <rect x="86" y="738" width="10" height="326" rx="5" fill="#F6C85F" stroke="#F6C85F" stroke-width="0"/>
  <text x="122" y="794" font-size="32" fill="#F7FAFC" font-weight="700" text-anchor="start">当前限制</text>
  <text x="122" y="842" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">还没有发布到 PyPI</text>
  <text x="122" y="880" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">API 后续可能调整</text>
  <text x="122" y="918" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">尚未正式支持 DDP / FSDP / DeepSpeed</text>
  <text x="122" y="956" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">尚未正式支持 Lightning / Transformers Trainer</text>
