  <text x="122" y="406" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">核心诊断功能已经可以运行</text>
  <text x="122" y="444" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">Python 3.10 / 3.11 / 3.12 CI</text>
  <text x="122" y="482" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">CPU 可用</text>
  <text x="122" y="520" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">基础 CUDA Tensor 支持</text>
  <text x="122" y="558" font-size="25" fill="#B7C3D7" font-weight="400" text-anchor="start">完全开源</text>
