  <text x="994" y="88" font-size="28" fill="#7D8CA5" font-weight="700" text-anchor="end">07/08</text>
  <text x="86" y="1386" font-size="24" fill="#7D8CA5" font-weight="400" text-anchor="start">真实项目状态</text>
  <text x="86" y="190" font-size="56" fill="#F7FAFC" font-weight="800" text-anchor="start">目前是 Alpha 测试版</text>
  <rect x="86" y="302" width="908" height="390" rx="32" fill="#101B2F" stroke="#2A3A57" stroke-width="2"/>
  <rect x="86" y="302" width="10" height="390" rx="5" fill="#56D68A" stroke="#56D68A" stroke-width="0"/>
