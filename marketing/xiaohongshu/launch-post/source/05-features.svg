  <text x="994" y="88" font-size="28" fill="#7D8CA5" font-weight="700" text-anchor="end">05/08</text>
  <text x="86" y="1386" font-size="24" fill="#7D8CA5" font-weight="400" text-anchor="start">当前可用能力</text>
  <text x="86" y="190" font-size="56" fill="#F7FAFC" font-weight="800" text-anchor="start">它现在能检查什么？</text>
  <rect x="86" y="318" width="908" height="126" rx="30" fill="#101B2F" stroke="#2A3A57" stroke-width="2"/>
  <rect x="118" y="349" width="94" height="64" rx="26" fill="#5CC8FF" stroke="#5CC8FF" stroke-width="0"/>
  <text x="165" y="394" font-size="29" fill="#07111F" font-weight="800" text-anchor="middle">01</text>
  <text x="242" y="396" font-size="30" fill="#F7FAFC" font-weight="700" text-anchor="start">optimizer 有没有漏参数</text>
  <rect x="86" y="468" width="908" height="126" rx="30" fill="#101B2F" stroke="#2A3A57" stroke-width="2"/>
  <rect x="118" y="499" width="94" height="64" rx="26" fill="#FF5A6A" stroke="#FF5A6A" stroke-width="0"/>
