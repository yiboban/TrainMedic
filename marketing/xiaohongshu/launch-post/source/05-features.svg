  <rect x="118" y="649" width="94" height="64" rx="26" fill="#F6C85F" stroke="#F6C85F" stroke-width="0"/>
  <text x="165" y="694" font-size="29" fill="#07111F" font-weight="800" text-anchor="middle">03</text>
  <text x="242" y="696" font-size="30" fill="#F7FAFC" font-weight="700" text-anchor="start">哪些参数 grad=None 或梯度异常</text>
  <rect x="86" y="768" width="908" height="126" rx="30" fill="#101B2F" stroke="#2A3A57" stroke-width="2"/>
  <rect x="118" y="799" width="94" height="64" rx="26" fill="#56D68A" stroke="#56D68A" stroke-width="0"/>
  <text x="165" y="844" font-size="29" fill="#07111F" font-weight="800" text-anchor="middle">04</text>
  <text x="242" y="846" font-size="30" fill="#F7FAFC" font-weight="700" text-anchor="start">optimizer.step 后参数有没有变化</text>
  <rect x="86" y="918" width="908" height="126" rx="30" fill="#101B2F" stroke="#2A3A57" stroke-width="2"/>
  <rect x="118" y="949" width="94" height="64" rx="26" fill="#A78BFA" stroke="#A78BFA" stroke-width="0"/>
  <text x="165" y="994" font-size="29" fill="#07111F" font-weight="800" text-anchor="middle">05</text>
  <text x="242" y="996" font-size="30" fill="#F7FAFC" font-weight="700" text-anchor="start">train / eval、Dropout、BatchNorm 是否正确</text>
  <text x="540" y="1218" font-size="32" fill="#B7C3D7" font-weight="700" text-anchor="middle">不是自动修复，而是把问题讲清楚。</text>
